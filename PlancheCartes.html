<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

@page{
    size: A4;
    margin: 10mm;
}

body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:white;
}

.infoImpression{
    margin-bottom:10px;
    font-size:14px;
}

@media print{
    .infoImpression{
        display:none;
    }
}

.planche{

    display:grid;

    grid-template-columns:repeat(2, 1fr);

    grid-template-rows:repeat(7, 38.1mm);

    column-gap:5mm;

    row-gap:2mm;

}

.carte{

    width:99.1mm;
    height:38.1mm;

    border:1px solid #0b57d0;
    border-radius:3mm;

    box-sizing:border-box;

    display:flex;
    align-items:center;

    padding:4mm;

}

.gauche{

    width:34mm;

    display:flex;
    justify-content:center;
    align-items:center;

}

.droite{

    flex:1;

    text-align:center;

}

.titre{

    color:#0055cc;

    font-size:18px;

    font-weight:bold;

    margin-bottom:3mm;

}

.nom{

    font-size:15px;

    font-weight:bold;

}

#qrcode{

    width:26mm;
    height:26mm;

}
</style>

</head>

<body>



<div class="infoImpression">
    Première étiquette : <?= premiereEtiquette ?>
</div>

<div class="planche">

<? for (let i = 0; i < cartes.length; i++) { ?>

<div class="carte">

<? if (cartes[i]) { ?>

    <div class="gauche">

        <div id="qrcode<?= i ?>"></div>

    </div>

    <div class="droite">

        <div class="titre">
            GVBLEUAZUR2
        </div>

        <div class="nom">
            <?= cartes[i].nomComplet ?>
        </div>

    </div>

<? } ?>

</div>

<? } ?>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

<? for (let i = 0; i < cartes.length; i++) { ?>

<? if (cartes[i]) { ?>

new QRCode(document.getElementById("qrcode<?= i ?>"),{

    text:"<?= cartes[i].qrCode ?>",

    width:90,
    height:90

});

<? } ?>

<? } ?>

</script>

<script>

window.onload = function () {

  window.print();

};

</script>

</body>

</html>
