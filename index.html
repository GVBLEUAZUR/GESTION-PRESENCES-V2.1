<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body{
      font-family:Arial,sans-serif;
      text-align:center;
      margin-top:40px;
      background:#f5f5f5;
    }

    h1{
      color:#1565c0;
    }

    button{
      font-size:22px;
      padding:15px 30px;
      border:none;
      border-radius:10px;
      background:#1565c0;
      color:white;
    }

    #reader{
      width:320px;
      margin:20px auto;
    }

    #resultat{
      margin-top:20px;
      font-size:20px;
      white-space:pre-line;
    }

  </style>

</head>

<body>

<h1>GVBLEUAZUR2</h1>

<button onclick="demarrerScanner()">
📷 Scanner une carte
</button>

<div id="reader"></div>

<div id="resultat"></div>

<script>

let scanner;
function demarrerScanner(){

  document.getElementById("resultat").innerHTML="Ouverture de la caméra...";

  scanner = new Html5Qrcode("reader");

  scanner.start(

      { facingMode: "environment" },

      {
        fps:10,
        qrbox:250
      },

      function(decodedText){

          scanner.stop();

          google.script.run
            .withSuccessHandler(function(message){

                document.getElementById("resultat").innerHTML=message;

            })
            .enregistrerPresence(decodedText);

      },

      function(errorMessage){
          // on ignore les erreurs de lecture
      }

  ).catch(function(err){

      document.getElementById("resultat").innerHTML=err;

  });

}

</script>

</body>
</html>
